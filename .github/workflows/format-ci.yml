name: Format Check

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  clang-format:
    name: clang-format (changed files vs main)
    runs-on: ubuntu-latest
    # Avoid duplicate runs: for same-repo PRs the push event already covers
    # the head SHA, so skip pull_request there. Forked PRs don't trigger push
    # on the upstream repo, so we still run pull_request for them.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch main
        run: git fetch origin main:refs/remotes/origin/main || true

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check formatting
        run: bash scripts/ci/format-changed.sh check --committed
